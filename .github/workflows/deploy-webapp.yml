# Required GitHub Secrets:
#   AWS_ROLE_ARN             - IAM role ARN for OIDC (from terraform output cicd_role_arn)
#   AWS_REGION               - us-west-2
#   WEBAPP_S3_BUCKET         - from terraform output webapp_bucket_name
#   WEBAPP_CF_DISTRIBUTION_ID - from terraform output webapp_cloudfront_distribution_id

name: Deploy Webapp

on:
  push:
    branches:
      - main
    paths:
      - apps/webapp/**

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v5.0.0
        with:
          version: 10

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22.17'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @glassact/webapp build

      - uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload index.html with no-cache headers
        run: |
          aws s3 cp apps/webapp/dist/index.html \
            s3://${{ secrets.WEBAPP_S3_BUCKET }}/index.html \
            --cache-control "no-store" \
            --content-type "text/html"

      - name: Sync remaining assets to S3
        run: |
          aws s3 sync apps/webapp/dist/ s3://${{ secrets.WEBAPP_S3_BUCKET }}/ \
            --delete \
            --exclude "index.html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.WEBAPP_CF_DISTRIBUTION_ID }} \
            --paths "/*"
