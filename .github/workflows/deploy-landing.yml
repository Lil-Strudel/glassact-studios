# Required GitHub Secrets:
#   AWS_ROLE_ARN              - IAM role ARN for OIDC (from terraform output cicd_role_arn)
#   AWS_REGION                - us-west-2
#   LANDING_S3_BUCKET         - from terraform output landing_bucket_name
#   LANDING_CF_DISTRIBUTION_ID - from terraform output landing_cloudfront_distribution_id

name: Deploy Landing

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - apps/landing/**

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v5.0.0
        with:
          version: 11

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22.17'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @glassact/landing build

      - uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync apps/landing/dist/ s3://${{ secrets.LANDING_S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.LANDING_CF_DISTRIBUTION_ID }} \
            --paths "/*"
