name: glassact

services:
  postgres:
    image: imresamu/postgis:18-3.6-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: glassact
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: glassact
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glassact -d glassact"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${API_IMAGE}
    restart: unless-stopped
    env_file:
      - /opt/glassact/api.env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

networks:
  internal:
    name: glassact_internal
